<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earth System Auditor - Verifikasi Deterministik</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --text: #34495e; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f3f5; color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9em; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        button:hover { background: var(--accent); }
        #loading { display: none; text-align: center; color: #e67e22; margin: 15px 0; font-weight: bold; }
        #result { display: none; margin-top: 25px; padding: 20px; background: #f9f9f9; border-radius: 10px; border-left: 5px solid var(--accent); }
        .temp-val { font-size: 3.5em; font-weight: bold; color: var(--primary); margin: 0; }
        .detail-text { font-size: 0.85em; color: #7f8c8d; line-height: 1.6; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Earth System Auditor</h2>
    
    <div class="input-group">
        <label>Lintang (Latitude):</label>
        <input type="number" id="lat" value="0" step="0.0001">
    </div>
    <div class="input-group">
        <label>Bujur (Longitude):</label>
        <input type="number" id="lng" value="109.32" step="0.0001">
    </div>
    <div class="input-group">
        <label>Bulan (1-12):</label>
        <input type="number" id="month" value="5" min="1" max="12">
    </div>

    <button onclick="runSystemAudit()">JALANKAN AUDIT</button>

    <div id="loading">Menganalisis Elevasi & Radiasi...</div>

    <div id="result">
        <p style="margin:0; font-weight:bold; color:#27ae60;">HASIL AUDIT SISTEM:</p>
        <h1 class="temp-val" id="tempDisplay">0°C</h1>
        <div class="detail-text" id="details"></div>
    </div>
</div>

<script>
async function runSystemAudit() {
    const lat = parseFloat(document.getElementById('lat').value);
    const lng = parseFloat(document.getElementById('lng').value);
    const month = parseInt(document.getElementById('month').value);
    const resultDiv = document.getElementById('result');
    const loading = document.getElementById('loading');

    loading.style.display = 'block';
    resultDiv.style.display = 'none';

    try {
        // 1. Ambil Elevasi Otomatis
        const response = await fetch(`https://api.open-elevation.com/api/v1/lookup?locations=${lat},${lng}`);
        const data = await response.json();
        const alt = data.results[0].elevation;

        // 2. Konstanta Fisika Absolut
        const Gsc = 1361; 
        const albedo = 0.3;
        const sigma = 5.670373e-8;
        const epsilon = 0.61;
        const dayMap = [15, 46, 74, 105, 135, 162, 198, 228, 258, 288, 319, 344];
        const n = dayMap[month - 1];

        // 3. Kalkulasi Geometri Surya
        const delta = 23.45 * Math.sin((2 * Math.PI / 365) * (n + 284));
        const cosTheta = Math.cos((lat - delta) * Math.PI / 180);
        const safeCos = Math.max(0.01, cosTheta); // Proteksi sudut malam hari

        // 4. Kalkulasi Energi & Suhu (Tahap Demi Tahap)
        const energyIn = Gsc * (1 - albedo) * safeCos;
        
        // T_Kelvin = (Energy / (4 * sigma * epsilon)) ^ 0.25
        const denominator = 4 * sigma * epsilon;
        const tKelvin = Math.pow(energyIn / denominator, 0.25);
        
        // Konversi ke Celsius
        const tBaseCelsius = tKelvin - 273.15;
        
        // Reduksi Mekanis (Ketinggian)
        const finalTemp = tBaseCelsius - (0.0065 * alt);

        // 5. Output ke Layar
        loading.style.display = 'none';
        resultDiv.style.display = 'block';
        document.getElementById('tempDisplay').innerText = finalTemp.toFixed(1) + "°C";
        document.getElementById('details').innerHTML = `
            <strong>Ketinggian:</strong> ${alt} m dpl<br>
            <strong>Radiasi Efektif:</strong> ${energyIn.toFixed(1)} W/m²<br>
            <strong>Posisi Matahari:</strong> ${delta.toFixed(1)}° Lintang<br>
            <strong>Status:</strong> Sistem Normal.
        `;
    } catch (error) {
        loading.innerText = "Koneksi API Gagal. Periksa internet Anda.";
    }
}
</script>
</body>
</html>
