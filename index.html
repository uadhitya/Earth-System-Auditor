<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earth System Auditor - Real-time Location</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --geo: #2980b9; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 450px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.85em; color: #7f8c8d; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; margin-bottom: 15px; font-size: 16px; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        button { flex: 2; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        .btn-geo { flex: 1; background: var(--geo); font-size: 14px; }
        button:hover { opacity: 0.9; }
        #result { display: none; margin-top: 25px; padding: 20px; background: #f9f9f9; border-radius: 15px; border-left: 6px solid var(--accent); }
        .temp-val { font-size: 3.5em; font-weight: bold; color: var(--primary); margin: 0; }
        .meta-info { font-size: 0.85em; color: #7f8c8d; line-height: 1.6; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Earth System Auditor</h2>
    
    <label>Lintang (Latitude):</label>
    <input type="number" id="lat" value="0" step="any">
    
    <label>Bujur (Longitude):</label>
    <input type="number" id="lng" value="109.32" step="any">
    
    <label>Bulan (1-12):</label>
    <input type="number" id="month" value="3">

    <div class="btn-group">
        <button onclick="auditSystem()">JALANKAN AUDIT</button>
        <button class="btn-geo" onclick="getLocation()">LOKASI SAYA</button>
    </div>

    <div id="result">
        <p style="margin:0; font-weight:bold; color: var(--accent);">STATUS: TERVERIFIKASI</p>
        <h1 class="temp-val" id="tempDisplay">0°C</h1>
        <div class="meta-info" id="metaInfo"></div>
    </div>
</div>

<script>
// Fungsi untuk mengambil koordinat GPS Perangkat
function getLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition((position) => {
            document.getElementById('lat').value = position.coords.latitude.toFixed(4);
            document.getElementById('lng').value = position.coords.longitude.toFixed(4);
            alert("Lokasi berhasil dideteksi!");
        }, () => {
            alert("Gagal mengakses lokasi. Pastikan izin GPS aktif.");
        });
    } else {
        alert("Browser Anda tidak mendukung fitur lokasi.");
    }
}

async function auditSystem() {
    const lat = parseFloat(document.getElementById('lat').value);
    const lng = parseFloat(document.getElementById('lng').value);
    const month = parseInt(document.getElementById('month').value);

    try {
        // Ambil Elevasi Otomatis
        const res = await fetch(`https://api.open-elevation.com/api/v1/lookup?locations=${lat},${lng}`);
        const data = await res.json();
        const alt = data.results[0].elevation;

        // Parameter Fisika
        const Gsc = 1361;
        const sigma = 5.670373e-8;
        const dayMap = [15, 46, 74, 105, 135, 162, 198, 228, 258, 288, 319, 344];
        
        // Logika Adaptif (Koreksi 0km & Everest)
        let albedo = 0.15 + (Math.min(alt, 8000) / 8000) * 0.6;
        let epsilon = 0.85 - (Math.min(alt, 8000) / 8000) * 0.35;

        // Geometri Surya
        const delta = 23.45 * Math.sin((2 * Math.PI / 365) * (dayMap[month-1] + 284));
        const cosTheta = Math.cos((lat - delta) * Math.PI / 180);
        const energyIn = Gsc * (1 - albedo) * Math.max(0.1, cosTheta);

        // Kalkulasi Presisi
        const kValue = energyIn / (4 * sigma * epsilon);
        const tKelvin = Math.pow(kValue, 0.25);
        const tBaseCelsius = tKelvin - 273.15;
        const finalTemp = tBaseCelsius - (0.0065 * alt);

        // Update Tampilan
        document.getElementById('result').style.display = 'block';
        document.getElementById('tempDisplay').innerText = finalTemp.toFixed(1) + "°C";
        document.getElementById('metaInfo').innerHTML = `
            <b>Elevasi:</b> ${alt}m dpl<br>
            <b>Albedo:</b> ${albedo.toFixed(2)} (Pantulan)<br>
            <b>Emisivitas:</b> ${epsilon.toFixed(2)} (Selimut Atmosfer)<br>
            <b>Energi Netto:</b> ${energyIn.toFixed(1)} W/m²
        `;
    } catch (e) { alert("Error koneksi database elevasi."); }
}
</script>
</body>
</html>
