<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earth System Auditor - Final Stable Version</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 450px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #ddd; }
        h2 { text-align: center; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 25px; border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        label { display: block; font-weight: bold; margin-top: 15px; font-size: 0.85em; color: #555; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; margin-top: 5px; box-sizing: border-box; font-size: 16px; }
        .btn-group { display: flex; gap: 10px; margin-top: 25px; }
        button { flex: 1; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { filter: brightness(1.1); }
        .btn-geo { background: #2980b9; }
        #result { display: none; margin-top: 30px; padding: 20px; background: #ebf5ee; border-radius: 10px; border-left: 5px solid var(--accent); }
        .temp-val { font-size: 3.5em; font-weight: bold; margin: 0; color: var(--primary); }
        .meta { font-size: 0.85em; line-height: 1.6; margin-top: 15px; color: #666; border-top: 1px solid #d1d1d1; padding-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>System Auditor</h2>
    
    <label>LINTANG (LATITUDE):</label>
    <input type="number" id="lat" value="0" step="any">
    
    <label>BUJUR (LONGITUDE):</label>
    <input type="number" id="lng" value="109.32" step="any">
    
    <label>BULAN (1-12):</label>
    <input type="number" id="month" value="3">

    <div class="btn-group">
        <button onclick="runAudit()">JALANKAN AUDIT</button>
        <button class="btn-geo" onclick="getLocation()">LOKASI SAYA</button>
    </div>

    <div id="result">
        <p style="margin:0; font-size:0.75em; font-weight:bold; color: var(--accent);">DETERMINISTIC STABLE OUTPUT:</p>
        <h1 class="temp-val" id="display">0°C</h1>
        <div class="meta" id="meta"></div>
    </div>
</div>

<script>
function getLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(p => {
            document.getElementById('lat').value = p.coords.latitude.toFixed(4);
            document.getElementById('lng').value = p.coords.longitude.toFixed(4);
            alert("Lokasi GPS berhasil dikunci.");
        });
    }
}

async function runAudit() {
    const lat = parseFloat(document.getElementById('lat').value);
    const lng = parseFloat(document.getElementById('lng').value);
    const month = parseInt(document.getElementById('month').value);

    try {
        const res = await fetch(`https://api.open-elevation.com/api/v1/lookup?locations=${lat},${lng}`);
        const data = await res.json();
        const alt = data.results[0].elevation;

        // --- 1. KONSTANTA FISIKA ---
        const Gsc = 1361; 
        const sigma = 0.00000005670373; // Stefan-Boltzmann
        const dayMap = [15, 46, 74, 105, 135, 162, 198, 228, 258, 288, 319, 344];
        
        // --- 2. VARIABEL ADAPTIF (LAPSE RATE) ---
        // Albedo: Rendah di 0m (0.12), Tinggi di Everest (0.70)
        let albedo = 0.12 + (Math.min(alt, 8848) / 8848) * 0.58;
        
        // Greenhouse: Menahan panas di 0m (0.64), Menipis di ketinggian
        let greenhouse = 0.64 - (Math.min(alt, 8848) / 8848) * 0.28;

        // --- 3. GEOMETRI SURYA ---
        const n = dayMap[month - 1];
        const delta = 23.45 * Math.sin((2 * Math.PI / 365) * (n + 284));
        const cosTheta = Math.cos((lat - delta) * Math.PI / 180);
        const energyIn = Gsc * (1 - albedo) * Math.max(0.1, cosTheta);

        // --- 4. PERSAMAAN STABIL (STEP-BY-STEP) ---
        // T = ( Energy / (4 * sigma * Greenhouse) ) ^ 0.25
        const pembagi = 4 * sigma * greenhouse;
        const hasilBagi = energyIn / pembagi;
        const T_Kelvin = Math.pow(hasilBagi, 0.25);
        const T_BaseCelsius = T_Kelvin - 273.15;
        
        // Reduksi Lapse Rate Mekanis
        const finalTemp = T_BaseCelsius - (0.0065 * alt);

        // --- 5. TAMPILKAN HASIL ---
        document.getElementById('result').style.display = 'block';
        document.getElementById('display').innerText = finalTemp.toFixed(1) + "°C";
        document.getElementById('meta').innerHTML = `
            KETINGGIAN: <b>${alt}m</b><br>
            ENERGI NETTO: <b>${energyIn.toFixed(1)} W/m²</b><br>
            ALBEDO LOKAL: <b>${albedo.toFixed(2)}</b><br>
            STABILITAS SISTEM: <b>TERKALIBRASI</b>
        `;
    } catch (e) { alert("Kesalahan: Gagal mengambil data elevasi."); }
}
</script>
</body>
</html>
