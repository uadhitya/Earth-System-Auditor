<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earth System Auditor - Precision v3.0</title>
    <style>
        :root { --primary: #1a1a1a; --accent: #27ae60; --bg: #f0f2f5; }
        body { font-family: 'Courier New', Courier, monospace; background: var(--bg); display: flex; justify-content: center; padding: 20px; color: var(--primary); }
        .container { width: 100%; max-width: 450px; background: white; padding: 30px; border-radius: 8px; border: 2px solid var(--primary); box-shadow: 10px 10px 0px var(--primary); }
        h2 { text-align: center; text-transform: uppercase; letter-spacing: 2px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        label { display: block; font-weight: bold; margin-top: 15px; font-size: 0.8em; }
        input { width: 100%; padding: 10px; border: 1px solid var(--primary); margin-top: 5px; box-sizing: border-box; font-size: 16px; background: #fafafa; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 15px; background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        button:hover { background: var(--accent); }
        #result { display: none; margin-top: 25px; padding: 20px; background: #e8f5e9; border: 1px dashed var(--accent); }
        .temp-val { font-size: 3.5em; font-weight: bold; margin: 0; color: var(--primary); }
        .meta { font-size: 0.8em; line-height: 1.6; margin-top: 10px; border-top: 1px solid #ccc; padding-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>System Auditor</h2>
    
    <label>LATITUDE (X):</label>
    <input type="number" id="lat" value="0" step="any">
    
    <label>LONGITUDE (Y):</label>
    <input type="number" id="lng" value="109.32" step="any">
    
    <label>MONTH (1-12):</label>
    <input type="number" id="month" value="3">

    <div class="btn-group">
        <button onclick="runAudit()">RUN SYSTEM AUDIT</button>
        <button onclick="getLocation()" style="background:#2980b9;">MY LOCATION</button>
    </div>

    <div id="result">
        <p style="margin:0; font-size:0.7em; font-weight:bold;">DETERMINISTIC OUTPUT:</p>
        <h1 class="temp-val" id="display">0°C</h1>
        <div class="meta" id="meta"></div>
    </div>
</div>

<script>
function getLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(p => {
            document.getElementById('lat').value = p.coords.latitude.toFixed(4);
            document.getElementById('lng').value = p.coords.longitude.toFixed(4);
        });
    }
}

async function runAudit() {
    const lat = parseFloat(document.getElementById('lat').value);
    const lng = parseFloat(document.getElementById('lng').value);
    const month = parseInt(document.getElementById('month').value);

    try {
        const res = await fetch(`https://api.open-elevation.com/api/v1/lookup?locations=${lat},${lng}`);
        const data = await res.json();
        const alt = data.results[0].elevation;

        // 1. KONSTANTA FISIKA (DIPERTajam)
        const Gsc = 1361;
        const sigma = 5.670373e-8;
        const dayMap = [15, 46, 74, 105, 135, 162, 198, 228, 258, 288, 319, 344];
        
        // 2. LOGIKA ADAPTIF (LAPSE RATE VARIABEL)
        let albedo = 0.12 + (Math.min(alt, 8848) / 8848) * 0.63;
        let epsilon = 0.92 - (Math.min(alt, 8848) / 8848) * 0.42;

        // 3. GEOMETRI SURYA
        const n = dayMap[month - 1];
        const delta = 23.45 * Math.sin((2 * Math.PI / 365) * (n + 284));
        const cosTheta = Math.cos((lat - delta) * Math.PI / 180);
        const energyIn = Gsc * (1 - albedo) * Math.max(0.1, cosTheta);

        // 4. PERBAIKAN KALKULASI (STEP-BY-STEP)
        // Rumus Dasar: T = (Energy / (sigma * epsilon)) ^ 0.25
        // Kita gunakan pembagi yang sudah digabung agar presisi
        const radiantFactor = sigma * epsilon;
        const kValue = energyIn / radiantFactor;
        
        // Menghitung suhu efektif (Kelvin)
        const T_Kelvin = Math.pow(kValue, 0.25);
        
        // Konversi ke Celsius (Suhu Dasar di Sea Level)
        const T_BaseCelsius = T_Kelvin - 273.15;
        
        // 5. REDUKSI MEKANIS (Tekanan Atmosfer)
        const finalTemp = T_BaseCelsius - (0.0065 * alt);

        // 6. OUTPUT VALIDASI
        document.getElementById('result').style.display = 'block';
        document.getElementById('display').innerText = finalTemp.toFixed(1) + "°C";
        document.getElementById('meta').innerHTML = `
            ALTITUDE: ${alt}m | ENERGY: ${energyIn.toFixed(1)}W/m²<br>
            ALBEDO: ${albedo.toFixed(2)} | EPSILON: ${epsilon.toFixed(2)}<br>
            CALIBRATION: SUCCESSFUL
        `;
    } catch (e) { alert("SYSTEM ERROR: API CONNECTION FAILED"); }
}
</script>
</body>
</html>
